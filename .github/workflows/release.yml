name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog for this version
        run: |
          python3 scripts/changelog-gen.py --version "${{ steps.version.outputs.version }}" > release-notes.md 2>/dev/null || echo "See CHANGELOG.md for details." > release-notes.md
          cat release-notes.md

      - name: Run validation
        run: |
          python3 -m py_compile scripts/gen.py
          python3 -m py_compile scripts/auto-learn.py
          python3 -m py_compile scripts/self-improve.py
          python3 -m py_compile scripts/version-bump.py
          python3 -m py_compile scripts/changelog-gen.py
          bash -n .claude/hooks/session-start.sh
          bash -n .claude/hooks/user-prompt-submit.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "claudekit v${{ steps.version.outputs.version }}"
          body_path: release-notes.md
          files: install.sh
          fail_on_unmatched_files: false
